name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e .[dev]
      - name: Syntax check
        run: |
          python -m py_compile server.py mac_connection.py
      - name: Smoke test (list_tools / list_prompts / list_resources)
        run: |
          python - <<'EOF'
          import asyncio
          from unittest.mock import patch, MagicMock
          # Avoid touching real SSH on import
          with patch("paramiko.SSHClient", MagicMock()):
              import server
          async def smoke():
              tools = await server.list_tools()
              prompts = await server.list_prompts()
              resources = await server.list_resources()
              assert len(tools) >= 30, f"tools={len(tools)}"
              assert len(prompts) == 5, f"prompts={len(prompts)}"
              assert len(resources) == 5, f"resources={len(resources)}"
              print(f"OK: {len(tools)} tools, {len(prompts)} prompts, {len(resources)} resources")
          asyncio.run(smoke())
          EOF
      - name: Lint (ruff)
        run: ruff check server.py mac_connection.py || true
      - name: Security scan (bandit)
        run: bandit -r server.py mac_connection.py -ll || true
