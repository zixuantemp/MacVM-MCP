name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e .[dev]
      - name: Syntax check
        run: |
          python -m py_compile server.py mac_connection.py
      - name: Smoke test (handler registration)
        run: |
          python - <<'EOF'
          from unittest.mock import patch, MagicMock
          # Avoid touching real SSH on import
          with patch("paramiko.SSHClient", MagicMock()):
              import server
          handlers = server.server.request_handlers
          handler_names = {t.__name__ for t in handlers.keys()}
          for required in ("ListToolsRequest", "ListPromptsRequest", "ListResourcesRequest"):
              assert required in handler_names, f"Missing {required}; have {handler_names}"
          print(f"OK — {len(handlers)} MCP handlers registered:", sorted(handler_names))
          EOF
      - name: Lint (ruff)
        # Uses pyproject.toml config (E,F,B; ignores E501 for shell heredocs)
        run: ruff check server.py mac_connection.py
      - name: Security scan (bandit)
        # Skip B404/B603/B607 (subprocess) — inherent to a remote-execution MCP server.
        run: bandit -r server.py mac_connection.py -ll --skip B404,B603,B607
